<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg-top: #2b2b30; --bg-bot: #161618;
    --card: rgba(255,255,255,0.08);
    --card-hi: rgba(255,255,255,0.14);
    --text: #f5f5f7; --muted: rgba(235,235,245,0.6);
    --accent: #34c759; --accent2: #0a84ff;
    --divider: rgba(255,255,255,0.07);
    --track: rgba(255,255,255,0.18); --thumb: #ffffff;
    --seg: rgba(255,255,255,0.10); --seg-on: rgba(255,255,255,0.95); --seg-on-text:#1c1c1e;
    --shadow: rgba(0,0,0,0.35);
  }
  body.light {
    --bg-top: #f2f2f7; --bg-bot: #e7e7ee;
    --card: rgba(0,0,0,0.05);
    --card-hi: rgba(0,0,0,0.09);
    --text: #1c1c1e; --muted: rgba(60,60,67,0.6);
    --divider: rgba(0,0,0,0.08);
    --track: rgba(0,0,0,0.16); --thumb:#ffffff;
    --seg: rgba(0,0,0,0.06); --seg-on:#ffffff; --seg-on-text:#1c1c1e;
    --shadow: rgba(0,0,0,0.18);
  }
  * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    font-family: "Segoe UI Variable Display", "Segoe UI", -apple-system, system-ui, sans-serif;
    background: linear-gradient(160deg, var(--bg-top), var(--bg-bot));
    color: var(--text);
    padding: 12px 14px;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }
  .head { display:flex; align-items:center; gap:8px; margin: 0 2px 8px; }
  .dot { width:8px; height:8px; border-radius:50%; background: var(--muted); transition: all .25s; }
  .dot.active { background: var(--accent); box-shadow: 0 0 9px 2px var(--accent); }
  .title { font-size: 13px; font-weight: 700; letter-spacing:.2px; }
  .spacer { flex:1; }
  .iconbtn { width:26px; height:26px; border-radius:50%; background:var(--card);
    display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:13px;
    transition: background .15s; }
  .iconbtn:active { background:var(--card-hi); }

  /* Handy-style uppercase section headers + flat grouped rows */
  .sec { font-size: 10.5px; font-weight: 700; letter-spacing:.7px; text-transform: uppercase;
    color: var(--muted); margin: 13px 4px 5px; }
  .sec:first-of-type { margin-top: 2px; }
  .group { background: var(--card); border-radius: 12px; overflow: hidden; }
  .group.gated { transition: opacity .2s; }
  .group.gated.disabled { opacity: .4; pointer-events: none; }
  .row { display:flex; align-items:center; padding: 11px 13px; }
  .row + .row, .col + .col { border-top: 1px solid var(--divider); }
  .col { padding: 11px 13px; }
  .hdr { display:flex; align-items:center; }
  .label { font-size: 13px; font-weight: 500; }
  .val { margin-left:auto; font-size:12px; color: var(--muted); font-variant-numeric: tabular-nums; }

  /* pill toggle (Handy sizing) */
  .switch { position: relative; width: 40px; height: 22px; margin-left:auto; flex:none; }
  .switch input { display:none; }
  .slider-sw { position:absolute; inset:0; background: var(--track); border-radius:999px;
    transition: background .25s; cursor:pointer; }
  .slider-sw::before { content:""; position:absolute; width:18px; height:18px; left:2px; top:2px;
    background:#fff; border-radius:50%; transition: transform .25s; box-shadow: 0 1px 3px var(--shadow); }
  .switch input:checked + .slider-sw { background: var(--accent); }
  .switch input:checked + .slider-sw::before { transform: translateX(18px); }

  /* range slider */
  input[type=range]{ -webkit-appearance:none; width:100%; height:5px; border-radius:999px;
    background: var(--track); margin: 11px 0 2px; outline:none; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:18px; height:18px;
    border-radius:50%; background: var(--thumb); box-shadow: 0 1px 4px var(--shadow); cursor:pointer; }

  /* segmented quick buttons */
  .seg { display:flex; gap:5px; margin-top:10px; }
  .seg button { flex:1; border:none; padding:8px 0; border-radius:9px; background:var(--seg);
    color:var(--text); font-size:11px; font-weight:600; cursor:pointer; transition: all .15s;
    font-family:inherit; }
  .seg button:active { transform: scale(0.96); }
  .seg button.on { background: var(--seg-on); color: var(--seg-on-text); }

  .footrow { display:flex; align-items:baseline; justify-content:center; gap:8px; margin-top:13px; }
  .quit { color:var(--muted); font-size:11.5px; cursor:pointer; }
  .quit:hover { color: var(--text); }
  .ver { color:var(--muted); font-size:11px; opacity:.65; font-variant-numeric: tabular-nums; }
</style>
</head>
<body class="dark">
  <div class="head">
    <div class="dot" id="dot"></div>
    <div class="title">HandyMute</div>
    <div class="spacer"></div>
    <div class="iconbtn" id="theme" title="Toggle dark / light">🌙</div>
  </div>

  <div class="sec">General</div>
  <div class="group">
    <div class="row">
      <div class="label">Enabled</div>
      <label class="switch"><input type="checkbox" id="enabled"><span class="slider-sw"></span></label>
    </div>
    <div class="row">
      <div class="label">Overlay</div>
      <label class="switch"><input type="checkbox" id="overlay"><span class="slider-sw"></span></label>
    </div>
  </div>

  <div class="sec">Sound</div>
  <div class="group gated">
    <div class="col">
      <div class="hdr"><div class="label">Outbound Volume</div><div class="val" id="teamsVal">0%</div></div>
      <input type="range" id="teams" min="0" max="100" value="0">
      <div class="seg">
        <button id="mute">Mute</button>
        <button id="quiet">Quiet</button>
        <button id="full">Full volume</button>
      </div>
    </div>
    <div class="col">
      <div class="hdr"><div class="label">Inbound Volume</div><div class="val" id="spkVal">20%</div></div>
      <input type="range" id="speaker" min="0" max="100" value="20">
    </div>
  </div>

  <div class="sec">Startup</div>
  <div class="group">
    <div class="row">
      <div class="label">Start at login</div>
      <label class="switch"><input type="checkbox" id="startup"><span class="slider-sw"></span></label>
    </div>
  </div>

  <div class="footrow">
    <span class="quit" id="quit">Quit HandyMute</span>
    <span class="ver" id="ver"></span>
  </div>

<script>
  function send(obj){ window.external.invoke(JSON.stringify(obj)); }
  const $ = id => document.getElementById(id);

  // Go pushes state here.
  window.applyState = function(s){
    document.body.className = (s.theme === "light") ? "light" : "dark";
    $("theme").textContent = (s.theme === "light") ? "☀️" : "🌙";
    $("enabled").checked = !!s.enabled;
    applyEnabled(!!s.enabled);
    $("overlay").checked = !!s.overlay;
    $("startup").checked = !!s.startup;
    $("teams").value = s.teams; $("teamsVal").textContent = s.teams + "%";
    $("speaker").value = s.speaker; $("spkVal").textContent = s.speaker + "%";
    markPreset(s.outboundPreset || "quiet");
    $("ver").textContent = s.version || "";
  };
  // Go pushes glow/active state here.
  window.setActive = function(on){ $("dot").classList.toggle("active", !!on); };

  function markPreset(name){
    ["mute","quiet","full"].forEach(id => $(id).classList.toggle("on", id === name));
  }

  function applyEnabled(on){
    document.querySelectorAll(".gated").forEach(el => el.classList.toggle("disabled", !on));
  }

  $("enabled").addEventListener("change", e => {
    applyEnabled(e.target.checked);
    send({action:"enabled", value:e.target.checked});
  });
  $("overlay").addEventListener("change", e => send({action:"overlay", value:e.target.checked}));
  $("startup").addEventListener("change", e => send({action:"startup", value:e.target.checked}));

  $("teams").addEventListener("input", e => {
    const v = +e.target.value; $("teamsVal").textContent = v+"%";
    send({action:"teams", value:v});
  });
  $("speaker").addEventListener("input", e => {
    const v = +e.target.value; $("spkVal").textContent = v+"%";
    send({action:"speaker", value:v});
  });

  document.querySelectorAll(".seg button").forEach(b => b.addEventListener("click", () => {
    markPreset(b.id);
    send({action:"outbound_preset", value:b.id});
  }));

  $("theme").addEventListener("click", () => {
    const next = document.body.classList.contains("light") ? "dark" : "light";
    send({action:"theme", value:next});
    document.body.className = next; $("theme").textContent = next==="light" ? "☀️" : "🌙";
  });

  $("quit").addEventListener("click", () => send({action:"quit"}));
  document.addEventListener("keydown", e => { if (e.key === "Escape") send({action:"hide"}); });

  // Ask Go for the current state once the page is ready.
  send({action:"ready"});
</script>
</body>
</html>
